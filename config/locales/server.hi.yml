hi:
  site_settings:
    proxytracer_enabled: "संपूर्ण ProxyTracer प्लगइन को सक्षम या अक्षम करने के लिए मास्टर टॉगल।"
    ProxyTracer_API_Key: "आपका API टोकन जो आप <a href=\"https://proxytracer.com/dashboard\" target=\"_blank\">proxytracer.com</a> से प्राप्त कर सकते हैं।"
    API_Timeout_ms: "टाइम आउट होने से पहले API की प्रतिक्रिया के लिए कितनी देर प्रतीक्षा करें (इकाई: मिलीसेकंड)।"
    Cache_Duration_hours: "API को दोबारा जांचने से पहले Redis में IP पते को कितनी देर तक याद रखें (इकाई: घंटे)।"
    Fail_Open_on_Error: "यदि API क्रैश हो जाता है या टाइम आउट हो जाता है, तो सभी को लॉक होने से बचाने के लिए उपयोगकर्ता को वैसे भी रजिस्टर/लॉगिन करने दें।"
    Enabled_during_Signup: "जब कोई नया उपयोगकर्ता रजिस्टर करने का प्रयास करे तो प्रॉक्सी और वीपीएन को ब्लॉक करें।"
    Enabled_during_Login: "जब कोई मौजूदा उपयोगकर्ता लॉगिन करने का प्रयास करे तो प्रॉक्सी और वीपीएन को ब्लॉक करें।"
    Enabled_for_All_Visitors: "प्रॉक्सी और वीपीएन को फ़ोरम के किसी भी पृष्ठ तक पहुँचने या देखने से रोकें। (चेतावनी: यह प्रत्येक विज़िटर की जाँच करता है और आपके API कोटा और Redis कैश का अत्यधिक उपयोग करता है)।"
    Block_Message: "ब्लॉक होने पर उपयोगकर्ता को दिखाया जाने वाला सटीक त्रुटि संदेश।"
    Whitelisted_IPs: "IP पते या CIDR रेंज (उदा. 192.168.1.0/24) जिन्हें ProxyTracer को बायपास करने की सख्त अनुमति है। प्रत्येक IP/रेंज टाइप करें और इसे सूची में जोड़ने के लिए Enter दबाएं।"
  dashboard:
    problem:
      proxy_tracer_missing_key: "ProxyTracer निष्क्रिय है! अवरोधन को सक्षम करने के लिए कृपया प्लगइन सेटिंग्स में अपनी ProxyTracer API कुंजी दर्ज करें।"
