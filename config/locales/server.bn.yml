bn:
  site_settings:
    proxytracer_enabled: "সম্পূর্ণ ProxyTracer প্লাগইন সক্ষম বা নিষ্ক্রিয় করার মাস্টার টগল।"
    ProxyTracer_API_Key: "আপনার API টোকেন যা আপনি <a href=\"https://proxytracer.com/dashboard\" target=\"_blank\">proxytracer.com</a> থেকে পেতে পারেন।"
    API_Timeout_ms: "টাইম আউট হওয়ার আগে API এর প্রতিক্রিয়ার জন্য কতক্ষণ অপেক্ষা করতে হবে (একক: মিলিসেকেন্ড)।"
    Cache_Duration_hours: "আবার API চেক করার আগে Redis-এ একটি IP ঠিকানা কতক্ষণ মনে রাখতে হবে (একক: ঘন্টা)।"
    Fail_Open_on_Error: "যদি API ক্র্যাশ করে বা টাইম আউট হয়, তাহলে সবাইকে লক আউট হওয়া থেকে বিরত রাখতে ব্যবহারকারীকে যাইহোক নিবন্ধন/লগইন করার অনুমতি দিন।"
    Enabled_during_Signup: "যখন একজন নতুন ব্যবহারকারী নিবন্ধন করার চেষ্টা করে তখন প্রক্সি এবং ভিপিএন ব্লক করুন।"
    Enabled_during_Login: "যখন একজন বিদ্যমান ব্যবহারকারী লগইন করার চেষ্টা করে তখন প্রক্সি এবং ভিপিএন ব্লক করুন।"
    Enabled_for_All_Visitors: "ফোরামের যেকোনো পৃষ্ঠা অ্যাক্সেস বা দেখা থেকে প্রক্সি এবং ভিপিএন ব্লক করুন। (সতर्कবার্তা: এটি প্রতিটি দর্শককে পরীক্ষা করে এবং আপনার API কোটা এবং Redis ক্যাশে ব্যাপকভাবে ব্যবহার করে)।"
    Block_Message: "অবরুদ্ধ হলে ব্যবহারকারীকে দেখানো সঠিক ত্রুটি বার্তা।"
    Whitelisted_IPs: "IP ঠিকানা বা CIDR রেঞ্জ (যেমন, 192.168.1.0/24) যা কঠোরভাবে ProxyTracer বাইপাস করার অনুমতিপ্রাপ্ত। প্রতিটি IP/রেঞ্জ টাইপ করুন এবং তালিকায় যোগ করতে Enter চাপুন।"
  dashboard:
    problem:
      proxy_tracer_missing_key: "ProxyTracer নিষ্ক্রিয়! ব্লকিং সক্ষম করতে দয়া করে প্লাগইন সেটিংসে আপনার ProxyTracer API কী লিখুন।"
